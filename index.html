<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Empty Project</title><meta itemprop="name" content="Empty Project"><meta name="twitter:title" content="Empty Project"><meta property="og:title" content="Empty Project"><meta property="og:site_name" content="Empty Project"><meta name="description" content="Start with a blank project."><meta itemprop="description" content="Start with a blank project."><meta property="og:description" content="Start with a blank project."><meta name="twitter:description" content="Start with a blank project."><script crossorigin="anonymous" src="./external/runtime/runtime.js"></script><script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam"></script><script>
  window.addEventListener('xrloaded', function() {
    var img = new Image()
    img.onload = function() {
      var w = img.naturalWidth
      var h = img.naturalHeight
      XR8.XrController.configure({
        imageTargetData: [{
          name: 'assets/imageii.png',
          imagePath: 'assets/imageii.png',
          type: 'PLANAR',
          properties: {
            originalWidth: w,
            originalHeight: h,
            left: 0,
            top: 0,
            width: w,
            height: h,
            isRotated: false
          }
        }]
      })
    }
    img.src = 'assets/imageii.png'

    // Image Target 떨림 방지 스무딩
    var THREE = window.THREE
    var SMOOTH = 0.2
    var smoothPos = null
    var smoothQuat = null
    var itObj = null
    var tracking = false

    XR8.addCameraPipelineModule({
      name: 'it-smoother',
      onRender: function() {
        if (!itObj) {
          var scene = XR8.CloudStudioThreejs.xrScene().scene
          scene.traverse(function(o) { if (o.name === 'Image Target') itObj = o })
        }
        if (!itObj) return

        if (!itObj.visible) {
          tracking = false
          return
        }

        if (!tracking) {
          smoothPos = itObj.position.clone()
          smoothQuat = itObj.quaternion.clone()
          tracking = true
          return
        }

        smoothPos.lerp(itObj.position, SMOOTH)
        smoothQuat.slerp(itObj.quaternion, SMOOTH)
        itObj.position.copy(smoothPos)
        itObj.quaternion.copy(smoothQuat)
      }
    })
  })
</script></head><body><script src="bundle.js"></script><div id="tap-hint" style="position: fixed;
